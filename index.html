<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <link rel="apple-touch-icon" href="icon.png" />
    <link rel="manifest" href="manifest.json" />

    <title>Recipeme</title>
    <style>
      * {
        -webkit-touch-callout: none;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        -ms-user-select: none;
        -webkit-user-drag: none;
        -webkit-touch-callout: none;
      }
      :root {
        --bg-gradient: linear-gradient(
          135deg,
          #fef9c3 0%,
          #e0f2fe 50%,
          #f3e8ff 100%
        );
        --btn-gradient: linear-gradient(135deg, #6ee7b7 0%, #3b82f6 100%);
        --btn-hover-gradient: linear-gradient(135deg, #3b82f6 0%, #6ee7b7 100%);
        --blue-accent: #6366f1;
        --text-main: #334155;
        --container-bg: rgba(255, 255, 255, 0.85);
        --readonly-bg: #f8fafc;
        --readonly-text: #475569;
        --readonly-border: #e2e8f0;
      }

      html {
        min-height: 100%;
        overflow-anchor: none;
        overflow-x: hidden;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        background: linear-gradient(
          135deg,
          #fef9c3 0%,
          #e0f2fe 50%,
          #f3e8ff 100%
        );

        background-repeat: no-repeat;
        background-size: cover;
      }

      body {
        margin: 0;
        color: var(--text-main);

        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;

        background: transparent;

        width: 100%;
        overflow-anchor: none;
        overflow-x: hidden;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }

      .view {
        display: none;
        opacity: 0;
        width: 100%;
        box-sizing: border-box;
        transition: opacity 0.25s ease;
        flex-direction: column;
        align-items: center;
        pointer-events: none;
      }

      .view.active {
        display: flex;
        opacity: 1;
        pointer-events: auto;
        box-sizing: border-box;
      }

      .page-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 85%;
        max-width: 500px;
        margin-top: max(2rem, env(safe-area-inset-top));
        margin-bottom: max(2rem, env(safe-area-inset-bottom));
        padding: 1.5rem;
        padding-bottom: 2rem;
        background-color: var(--container-bg);
        border-radius: 1.2rem;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.5);
        box-sizing: border-box;
      }

      .button {
        height: 3rem;
        width: 100%;
        background: var(--btn-gradient);
        color: #fff;
        border-radius: 0.75rem;
        font-size: 1.2rem;
        font-weight: 600;
        border: none;
        cursor: pointer;
        transition: all 0.2s ease;
        margin: 0.5rem 0;
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        z-index: 10;
        flex-shrink: 0;
        -webkit-tap-highlight-color: transparent;
      }

      .delButton {
        width: 48%;
        margin: auto;
      }

      @media (hover: hover) and (pointer: fine) {
        .button:hover {
          transform: scale(1.02);
          box-shadow: 0 4px 12px rgba(253, 160, 133, 0.4);
        }
        .button:active {
          transform: scale(0.98);
          box-shadow: 0 4px 12px rgba(253, 160, 133, 0.4);
        }
      }

      .input {
        min-height: 55px;
        height: 55px;
        padding-right: 1rem;
        padding-left: 1rem;
        align-content: center;
      }
      .input,
      .textarea {
        width: 100%;
        margin: 0.5rem 0;
        border: 1px solid #cbd5e1;
        border-radius: 0.75rem;
        font-size: 16px;
        line-height: 1.6;
        padding-right: 1rem;
        padding-left: 1rem;
        resize: none;
        overflow: hidden;
        overflow-anchor: none;
        box-sizing: border-box;
        background: #fff;
        outline: none;
        transition: all 0.3s ease;
        user-select: text !important;
        -webkit-user-select: text !important;
        -ms-user-select: text !important;
        font-family: inherit;
      }

      .textarea {
        min-height: 120px;
        padding: 0.75rem 1rem;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      .input:focus,
      .textarea:focus {
        border-color: var(--blue-accent);
        background: #f0f9ff;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
      }

      .readonly-box {
        background-color: var(--readonly-bg) !important;
        color: var(--readonly-text);
        border: 1px solid var(--readonly-border);
        text-align: right;
      }

      #ingredients-list {
        display: flex;
        flex-direction: column;
        width: 100%;
        margin: 5px 0;
      }

      #display-ingredients {
        width: 100%;
        padding: 0;
        margin: 0.5rem 0;
        list-style: none;
        text-align: right;
        direction: rtl;
      }

      #display-ingredients li {
        margin-bottom: 0.5rem;
        padding: 0.4rem 0;
        display: flex;
        box-sizing: border-box;
        align-items: flex-start;
        gap: 10px;
        margin-bottom: 8px;
        line-height: 1.4;
        word-break: keep-all;
        overflow-wrap: anywhere;
        user-select: text !important;
        -webkit-user-select: text !important;
        -ms-user-select: text !important;
      }

      #display-ingredients li::before {
        content: "🔪 ";
        flex-shrink: 0;
      }

      #display-method {
        width: 100%;
        box-sizing: border-box;
        resize: none;
        overflow: hidden;
        border: 1px solid var(--readonly-border);
        background: var(--readonly-bg);
        padding: 15px;
        border-radius: 12px;
        line-height: 1.6;
        font-family: inherit;
        font-size: 1rem;
      }

      #display-name {
        text-align: center;
        overflow-wrap: break-word;
        margin-bottom: 20px;
        color: var(--blue-accent);
        width: 100%;
        max-width: 100%;
        margin-top: 0;
        user-select: text !important;
        -webkit-user-select: text !important;
        -ms-user-select: text !important;
      }

      .label {
        width: 100%;
        text-align: right;
        font-weight: 600;
        color: var(--blue-accent);
        margin-top: 0.8rem;
        font-size: 1.1rem;
        pointer-events: none;
      }

      .logo-home {
        width: clamp(120px, 35vh, 250px);
        aspect-ratio: 1 / 1;
        display: block;

        margin-top: clamp(0rem, min(15vh, 50vw), 8rem);
        margin-bottom: clamp(0rem, min(15vh, 50vw), 8rem);
        margin-left: auto;
        margin-right: auto;
        border-radius: 50%;
        object-fit: cover;
      }

      .search-group {
        display: flex;
        width: 85%;
        max-width: 500px;
        min-height: 3.5rem;
        margin-bottom: 1.5rem;
        border: 2px solid #93c5fd;
        border-radius: 0.75rem;
        overflow: hidden;
        background: #fff;
        transition: all 0.3s ease;
      }

      .search-group:focus-within {
        border-color: var(--blue-accent);
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
      }

      .search-input {
        flex: 4;
        border: none !important;
        border-radius: 0 !important;
        margin: 0 !important;
        height: 100%;
      }

      .search-input:focus {
        outline: none;
        background-color: #fbfdff;
      }

      .search-button {
        flex: 1;
        border: none !important;
        border-right: 1px solid #bfdbfe;
        border-radius: 0 !important;
        margin: 0 !important;
        height: auto !important;
        min-height: 3.5rem;
        background: #eff6ff;
        color: var(--blue-accent);
      }

      .marquee-container {
        width: 100%;
        overflow: hidden;
        white-space: nowrap;
        position: relative;
        display: flex;
        direction: rtl;
      }

      .marquee-text {
        display: inline-block;
        white-space: nowrap;
        animation: marquee-infinite 40s linear infinite;
        will-change: transform;
      }

      @keyframes marquee-infinite {
        0% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(50%);
        }
      }

      .button:hover .marquee-text {
        animation-play-state: paused;
      }

      .button:active .marquee-text {
        animation-play-state: paused;
      }

      #toast {
        position: fixed;
        left: 50%;
        bottom: 2rem;
        transform: translate(-50%, 50px);
        background: rgba(15, 23, 42, 0.9);
        color: #fff;
        padding: 0.8rem 1.5rem;
        border-radius: 2rem;
        font-weight: 500;
        opacity: 0;
        transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        z-index: 9999;
        pointer-events: none;
        white-space: nowrap; /* מונע ירידת שורה */
        width: max-content; /* מתאים את הרוחב אוטומטית לטקסט */
        max-width: 90vw; /* מגבלה למקרה שהטקסט ארוך מהמסך עצמו */
        overflow: hidden;
        text-overflow: ellipsis; /* מוסיף ... אם הטקסט ארוך מהמסך */
      }
      #toast.show {
        opacity: 1;
        transform: translate(-50%, 0);
      }

      .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(3px);
        z-index: 1000;
        justify-content: center;
        align-items: center;
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      .modal-overlay.active {
        display: flex;
        opacity: 1;
      }
      .modal-content {
        background: white;
        padding: 25px;
        border-radius: 12px;
        width: 85%;
        max-width: 320px;
        text-align: center;
        transform: scale(0.9);
        transition: transform 0.3s ease;
      }
      .modal-overlay.active .modal-content {
        transform: scale(1);
      }

      .loader-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: calc(var(--vh, 1vh) * 100);
      }
      .cooking-pot {
        width: 60px;
        height: 40px;
        background: #475569;
        border-radius: 0 0 20px 20px;
        position: relative;
        animation: bouncePot 1s infinite alternate;
      }
      .cooking-pot::before {
        content: "";
        position: absolute;
        top: -10px;
        left: 10px;
        width: 40px;
        height: 10px;
        background: #94a3b8;
        border-radius: 50%;
      }
      .cooking-pot::after {
        content: "";
        position: absolute;
        top: 10px;
        right: -25px;
        width: 30px;
        height: 8px;
        background: #475569;
        border-radius: 10px;
        transform: rotate(20deg);
      }
      @keyframes bouncePot {
        0% {
          transform: translateY(0);
        }
        100% {
          transform: translateY(-10px);
        }
      }
      .loader-text {
        margin-top: 1.5rem;
        color: var(--blue-accent);
        font-weight: bold;
        font-size: 1.2rem;
      }

      /* עטיפה לכל שורת מצרך (המבורגר + טקסטארייה) */
      .sortable-item {
        display: flex;
        align-items: flex-start; /* שומר שההמבורגר יישאר למעלה אם הטקסט ארוך */
        width: 100%;
        gap: 10px;
        margin: 0.5rem 0;
        transition: background-color 0.2s ease;
      }

      /* ביטול המרווח המקורי של האינפוט כדי שהעטיפה תנהל אותו */
      .sortable-item .input {
        margin: 0;
        flex-grow: 1;
      }

      /* עיצוב ידית הגרירה (המבורגר) שמותאם לעיצוב שלך */
      .drag-handle {
        cursor: grab;
        display: flex;
        flex-direction: column;
        gap: 4px;
        padding: 15px 5px; /* ממרכז מול השורה הראשונה של הטקסט */
        user-select: none;
        -webkit-tap-highlight-color: transparent;

        /* שורות התיקון שיאפשרו את הגרירה מחדש: */
        -webkit-user-drag: element !important;
        touch-action: none !important;
      }

      .drag-handle span {
        width: 18px;
        height: 2px;
        background-color: var(--blue-accent);
        border-radius: 2px;
        opacity: 0.7;
        transition: opacity 0.2s;
      }

      .drag-handle:hover span {
        opacity: 1;
      }

      .drag-handle:active {
        cursor: grabbing;
      }

      /* קלאס לאלמנט שמוזז באוויר */
      .sortable-ghost {
        opacity: 0.5;
        background-color: #f0f9ff;
        border-radius: 0.75rem;
      }
    </style>
  </head>
  <body>
    <div id="toast">הודעה</div>

    <div id="delete-modal" class="modal-overlay" onclick="closeDeleteModal()">
      <div class="modal-content" onclick="event.stopPropagation()">
        <h3 style="color: #ef4444; margin-top: 0">מחיקת מתכון</h3>
        <p>האם למחוק את המתכון לצמיתות?</p>
        <div style="display: flex; gap: 15px; margin-top: 20px">
          <button
            class="button delButton"
            style="background: #ef4444"
            id="confirm-delete-btn"
          >
            כן, מחק
          </button>
          <button
            class="button delButton"
            style="background: #94a3b8"
            onclick="closeDeleteModal()"
          >
            ביטול
          </button>
        </div>
      </div>
    </div>

    <div id="view-loading" class="view">
      <div class="loader-container">
        <div class="cooking-pot"></div>
        <div class="loader-text"></div>
      </div>
    </div>

    <div id="view-home" class="view active">
      <img
        src="icon.png"
        class="logo-home"
        alt="Logo"
        onerror="this.style.display = 'none'"
        oncontextmenu="return false;"
        ondragstart="return false;"
      />

      <div class="search-group">
        <textarea
          id="search-input"
          class="input search-input"
          placeholder="חפש מתכון..."
          oninput=" autoResize(this) "
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
          inputmode="text"
          data-form-type="other"
        ></textarea>
        <button
          class="button search-button"
          onclick="
            searchRecipesLocal(document.getElementById('search-input').value, false);
          "
        >
          🔍
        </button>
      </div>

      <button
        class="button"
        style="width: 85%; max-width: 500px"
        onclick="
          resetAddForm();
          navigateTo('view-add', false);
          initSortableIngredients();
        "
      >
        הוספת מתכון חדש
      </button>
    </div>

    <div id="view-search" class="view">
      <div class="page-container">
        <h2 style="color: var(--blue-accent)">תוצאות חיפוש</h2>
        <div id="search-results" style="width: 100%"></div>
      </div>
    </div>

    <div id="view-add" class="view">
      <div class="page-container">
        <h2
          id="view-add-title"
          class="label"
          style="text-align: center; font-size: 1.5rem"
        >
          הוספת מתכון חדש
        </h2>

        <div class="label">שם המתכון</div>
        <textarea
          id="recipe-name"
          class="input"
          placeholder="למשל: עוגת שוקולד"
          oninput="
            autoResize(this)
            // keepCaretVisible(this);
          "
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
          inputmode="text"
          data-form-type="other"
        ></textarea>

        <div class="label">מצרכים</div>
        <div id="ingredients-list"></div>

        <div class="label">אופן ההכנה</div>
        <textarea
          id="recipe-method"
          class="textarea"
          placeholder="איך מכינים?"
          oninput="
            autoResize(this)
            // keepCaretVisible(this);
          "
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
          inputmode="text"
          data-form-type="other"
        ></textarea>

        <button class="button" id="save-btn" onclick="saveRecipe()">
          שמור מתכון
        </button>
      </div>
    </div>

    <div id="view-recipe" class="view">
      <div class="page-container">
        <h1 id="display-name"></h1>
        <div class="label">מצרכים</div>
        <ul id="display-ingredients"></ul>
        <div class="label">אופן ההכנה</div>
        <div id="display-method" class="textarea"></div>

        <button
          class="button"
          style="background: #3b82f6; margin-top: 1.5rem"
          onclick="openEditRecipe()"
        >
          עדכון מתכון
        </button>
        <button
          class="button"
          style="background: #ef4444; margin-top: 0.5rem"
          onclick="askDeleteRecipe()"
        >
          מחיקת מתכון
        </button>
      </div>
    </div>

    <script>
      // ⚠️ החלף את הלינק!
      const API_URL =
        "https://script.google.com/macros/s/AKfycbyg7jQ1hnPkzT-yBVJfUbluXyMToMvS06ezUNXHM985po1PyiVccNKf3oeMSDLsxdIT/exec";
      const CACHE_KEY = "recipeme_data";

      let cachedRecipes = [];
      let currentRecipeName = "";
      let groceryList = [""];
      let isEditMode = false; // מעקב אם אנחנו בעריכה או בהוספה
      let lastSearchQuery = "";

      function loadFromCache() {
        try {
          const data = localStorage.getItem(CACHE_KEY);
          if (data) cachedRecipes = JSON.parse(data);
        } catch (e) {
          console.error(e);
        }
      }

      function saveToCache() {
        try {
          localStorage.setItem(CACHE_KEY, JSON.stringify(cachedRecipes));
        } catch (e) {
          showToast("זיכרון מלא. נשמר בענן בלבד.");
        }
      }

      // סנכרון תמידי ברקע
      async function backgroundSync() {
        try {
          const res = await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({ action: "familyGetAllRecipes" }),
          });
          const result = await res.json();
          if (result.status === "success") {
            cachedRecipes = result.data;
            saveToCache(); // הגיליון תמיד קובע ודורס את הזיכרון
          }
        } catch (e) {
          console.log("משתמשים בנתוני אופליין");
        }
      }

      window.onload = () => {
        loadFromCache();
        backgroundSync();

        navigateTo("view-home", true);

        const searchInput = document.getElementById("search-input");
        if (searchInput) {
          searchInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
              e.preventDefault();
              searchRecipesLocal(searchInput.value, false);
              // searchInput.value = "";
            }
          });
        }

        const recipeNameInput = document.getElementById("recipe-name");
        if (recipeNameInput) {
          recipeNameInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
              e.preventDefault();

              const firstIngredient = document.querySelector(".ing-input");

              if (firstIngredient) {
                firstIngredient.focus();
              }
            }
          });
        }
      };

      window.onpopstate = (e) => {
        if (
          document.getElementById("delete-modal").classList.contains("active")
        ) {
          closeDeleteModal();
          return;
        }

        const targetView = e.state && e.state.view ? e.state.view : "view-home";

        // מנגנון הגנה: אם המשתמש מנסה לחזור לדף מתכון, נבדוק אם המתכון עדיין קיים
        if (targetView === "view-recipe") {
          const recipeExists = cachedRecipes.find(
            (r) => r.name === currentRecipeName,
          );
          if (!recipeExists) {
            // המתכון נמחק! נעיף אותו לדף הבית במקום לדף שבור
            history.replaceState({ view: "view-home" }, "", "#home");
            switchViewElement("view-home");
            return;
          } else {
            // המתכון קיים, נרנדר אותו מחדש למקרה שהוא בדיוק נערך!
            renderRecipeData(recipeExists);
          }
        }

        switchViewElement(targetView);
      };

      function navigateTo(viewId, replace = false) {
        if (replace)
          history.replaceState(
            { view: viewId },
            "",
            `#${viewId.replace("view-", "")}`,
          );
        else
          history.pushState(
            { view: viewId },
            "",
            `#${viewId.replace("view-", "")}`,
          );
        switchViewElement(viewId);
      }

      // מצב עריכה
      function openEditRecipe() {
        isEditMode = true;
        const recipe = cachedRecipes.find((r) => r.name === currentRecipeName);
        if (!recipe) return;
        
        document.getElementById("view-add-title").innerText = "עדכון מתכון";
        
        const nameInput = document.getElementById("recipe-name");
        nameInput.value = recipe.name;
        nameInput.readOnly = true;
        nameInput.classList.add("readonly-box"); // משחיר את הרקע קצת
        
        groceryList = [...recipe.ingredients, ""];
        renderIngredients();

        document.getElementById("recipe-method").value = recipe.method;
        
        navigateTo("view-add", true);

        // תיקון הגובה: נמתין שהדף יוצג ואז נחשב גובה
        setTimeout(() => {
          autoResize(nameInput);

          document.querySelectorAll(".ing-input").forEach((input) => {
            autoResize(input);
          });

          autoResize(document.getElementById("recipe-method"));
        }, 350);
      }

      // חזרה למצב הוספה רגיל
      function resetAddForm() {
        isEditMode = false;

        document.getElementById("view-add-title").innerText = "הוספת מתכון חדש";
        
        const nameInput = document.getElementById("recipe-name");
        nameInput.value = "";
        nameInput.style.height = "auto";
        nameInput.readOnly = false;
        nameInput.classList.remove("readonly-box");

        groceryList = [""];
        renderIngredients();

        document.getElementById("recipe-method").value = "";
        document.getElementById("recipe-method").style.height = "auto";
      }

      function switchViewElement(viewId) {
        const currentView = document.querySelector(".view.active");
        const nextView = document.getElementById(viewId);

        if (currentView && currentView.id !== viewId) {
          currentView.classList.add("fading-out");
          currentView.classList.remove("active");
          setTimeout(() => {
            currentView.classList.remove("fading-out");
            currentView.style.display = "none";
            showNextView(nextView, viewId);
          }, 100);
        } else {
          showNextView(nextView, viewId);
        }
      }

      function showNextView(nextView, viewId) {
        nextView.style.display = "flex";
        void nextView.offsetWidth;
        nextView.classList.add("active");
        document.documentElement.scrollTop = 0;
        document.body.scrollTop = 0;
        if (viewId === "view-recipe") {
          autoResize(document.getElementById("display-method"));
        }
      }

      function showToast(msg) {
        const t = document.getElementById("toast");
        t.innerText = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 3000);
      }

      function createMarqueeText(text) {
        if (text.length > 35) {
          // משכפלים את הטקסט כדי ליצור רצף אינסופי
          const separator = "&nbsp;".repeat(15);
          const content = `${text}${separator}${text}${separator}`;
          return `
    <div class="marquee-container">
      <div class="marquee-text">
        ${content} </div>
    </div>`;
        }
        return text;
      }

      function normalizeHebrew(str) {
        return str
          .replace(/ך/g, "כ")
          .replace(/ם/g, "מ")
          .replace(/ן/g, "נ")
          .replace(/ף/g, "פ")
          .replace(/ץ/g, "צ");
      }

      // חיפוש כולל תמיכה בנקודה (.)
      function searchRecipesLocal(query, del = false) {
        lastSearchQuery = query;
        const term = query.trim();
        let results = cachedRecipes;

        if (term && term !== ".") {
          results = cachedRecipes.filter((r) =>
            normalizeHebrew(r.name).includes(normalizeHebrew(term)),
          );
          results.sort((a, b) => a.name.indexOf(term) - b.name.indexOf(term));
        }

        const list = document.getElementById("search-results");
        list.innerHTML = "";

        if (results.length === 0) {
          list.innerHTML = "<p style='color: #64748b; display: flex; align-items: center; justify-content: center; text-decoration: none;'>לא נמצאו מתכונים</p>";
          showToast("לא נמצאו מתכונים");
        } else {
          results.forEach((recipe) => {
            const b = document.createElement("button");
            b.className = "button";
            b.innerHTML = createMarqueeText(recipe.name);
            b.onclick = () => {
              // 🔴 התיקון: שולפים את הנתונים המעודכנים ביותר לפי השם רגע לפני המעבר
              const latestData =
                cachedRecipes.find((r) => r.name === recipe.name) || recipe;

              renderRecipeData(latestData);
              navigateTo("view-recipe", false);
            };
            list.appendChild(b);
          });
          !del && navigateTo("view-search", false);
          if (document.getElementById("search-input")) {
            document.getElementById("search-input").value = "";
          }
        }
      }

      function renderRecipeData(recipe) {
        currentRecipeName = recipe.name;
        document.getElementById("display-name").innerHTML = createMarqueeText(
          recipe.name,
        );
        document.getElementById("display-ingredients").innerHTML =
          recipe.ingredients.map((i) => `<li>${i}</li>`).join("");
        document.getElementById("display-method").innerText = recipe.method;
      }

      async function saveRecipe() {
        const name = document.getElementById("recipe-name").value.trim();
        const method = document.getElementById("recipe-method").value.trim();
        const ingredients = groceryList.filter((item) => item.trim() !== "");

        if (!isEditMode && cachedRecipes.some((r) => r.name === name)) {
          showToast("כבר קיים מתכון בשם הזה");
          return;
        }

        if (!name || !method || ingredients.length === 0) {
          showToast("חובה למלא שם, מצרכים ואופן הכנה");
          return;
        }

        const newRecipe = { name, ingredients, method };
        const saveBtn = document.getElementById("save-btn");
        saveBtn.disabled = true;

        const actionType = isEditMode ? "familyUpdateRecipe" : "familyAddRecipe";

        // 1. ממשק אופטימי - שמירה בזיכרון
        if (isEditMode) {
          const index = cachedRecipes.findIndex((r) => r.name === name);
          if (index > -1) cachedRecipes[index] = newRecipe;
        } else {
          cachedRecipes.unshift(newRecipe);
        }
        saveToCache();

        showToast(isEditMode ? "המתכון עודכן בהצלחה!" : "המתכון נשמר בהצלחה!");
        renderRecipeData(newRecipe);
        saveBtn.disabled = false;

        if (isEditMode) {
          navigateTo("view-recipe", true);
        } else {
          // אם זה מתכון חדש, הולכים קדימה
          renderRecipeData(newRecipe);
          navigateTo("view-recipe", true);
        }

        // 2. סנכרון שקט ברקע מול השרת
        try {
          const response = await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({ action: actionType, recipe: newRecipe }),
          });
          const result = await response.json();
          if (result.status !== "success") throw new Error(result.message);
        } catch (error) {
          // מחיקה/שחזור מהקאש במקרה של כישלון בשרת
          if (!isEditMode) {
            cachedRecipes = cachedRecipes.filter((r) => r.name !== name);
          }
          saveToCache();
          showToast("שגיאה בסנכרון לענן: הנתון לא נשמר בשרת");
        }
      }

      function askDeleteRecipe() {
        document.getElementById("delete-modal").classList.add("active");
      }

      function closeDeleteModal() {
        document.getElementById("delete-modal").classList.remove("active");
      }

      document.getElementById("confirm-delete-btn").onclick = async () => {
        closeDeleteModal();
        const nameToDelete = currentRecipeName;

        const recipeIndex = cachedRecipes.findIndex(
          (r) => r.name === nameToDelete,
        );
        if (recipeIndex === -1) return;
        const backupRecipe = cachedRecipes[recipeIndex];

        cachedRecipes.splice(recipeIndex, 1);
        saveToCache();
        showToast("המתכון נמחק");

        // רענון דף החיפוש כדי להסיר את המתכון שנמחק
        searchRecipesLocal(lastSearchQuery, true);

        navigateTo("view-home", true);
        window.location.href = "#home"; // מאפס לגמרי את המעבר קדימה

        try {
          const res = await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({
              action: "familyDeleteRecipe",
              name: nameToDelete,
            }),
          });
          const result = await res.json();
          if (result.status !== "success") throw new Error(result.message);
        } catch (e) {
          if (backupRecipe) {
            cachedRecipes.splice(recipeIndex, 0, backupRecipe);
            saveToCache();
          }
          showToast("שגיאה במחיקה מהענן.");
        }
      };

      function renderIngredients() {
        const container = document.getElementById("ingredients-list");
        container.innerHTML = "";
        groceryList.forEach((item, index) => {
          createIngredientInput(index, item);
        });
      }

      function createIngredientInput(index, value) {
        const container = document.getElementById("ingredients-list");

        // 1. יצירת אלמנט עוטף
        const wrapper = document.createElement("div");
        wrapper.className = "sortable-item";

        // 2. יצירת ידית הגרירה (המבורגר)
        const handle = document.createElement("div");
        handle.className = "drag-handle";
        handle.innerHTML = "<span></span><span></span><span></span>";

        // 3. הקוד המקורי שלך ליצירת ה-textarea
        const input = document.createElement("textarea");
        input.type = "text";
        input.className = "input ing-input";
        input.dataset.index = index;
        input.value = value;
        input.placeholder = index === 0 ? "הוסף מצרך ראשון" : "הוסף מצרך נוסף";

        input.setAttribute("autocorrect", "off");
        input.setAttribute("autocapitalize", "off");
        input.setAttribute("spellcheck", "false");
        input.setAttribute("autocomplete", "off");
        input.setAttribute("data-lpignore", "true");
        input.setAttribute("data-form-type", "other");
        input.setAttribute("name", "no-autofill");

        input.oninput = (e) => {
          const currentIndex = Number(input.dataset.index);
          groceryList[currentIndex] = e.target.value;
          autoResize(e.target);

          // בודק אם כל הפריטים במערך מכילים טקסט (כלומר, המערך "מלא" ואין אף שדה ריק)
          const isArrayFull = groceryList.every((item) => item.trim() !== "");

          // אם כל המערך מלא, נוסיף שדה ריק חדש בסוף
          if (isArrayFull) {
            groceryList.push("");
            createIngredientInput(groceryList.length - 1, "");
          }
        };

        input.onkeydown = (e) => {
          const currentIndex = Number(input.dataset.index);
          if (e.key === "Enter" || e.key === "Tab") {
            if (e.key === "Enter") {
              e.preventDefault();
            }
            const allInputs = container.querySelectorAll(".ing-input");
            if (allInputs[currentIndex + 1]) {
              allInputs[currentIndex + 1].focus();
            }
          }
        };

        input.onblur = (e) => {
          const inputEl = e.target;
          const currentIndex = Number(inputEl.dataset.index);
          const val = inputEl.value.trim();

          // מעדכנים את הערך במערך
          groceryList[currentIndex] = val;

          // סופרים כמה פריטים ריקים יש כרגע בכל הרשימה
          const emptyItemsCount = groceryList.filter(
            (item) => item.trim() === "",
          ).length;

          // אם השדה הנוכחי ריק, ויש יותר משדה ריק אחד במערך (כלומר יש עוד אחד שממתין להקדה), נמחק אותו
          if (val === "" && emptyItemsCount > 1) {
            // מחיקה מהמערך
            groceryList.splice(currentIndex, 1);

            // מחיקה מה־DOM
            wrapper.remove();

            // עדכון אינדקסים ו-placeholders לכל השדות שנשארו
            const container = document.getElementById("ingredients-list");
            container.querySelectorAll(".ing-input").forEach((el, i) => {
              el.dataset.index = i;
              el.placeholder = i === 0 ? "הוסף מצרך ראשון" : "הוסף מצרך נוסף";
            });
          }
        };

        // 4. הוספת האלמנטים לעטיפה ולמיכל הראשי
        wrapper.appendChild(handle);
        wrapper.appendChild(input);
        container.appendChild(wrapper);

        autoResize(input);
      }

      function initSortableIngredients() {
        const container = document.getElementById("ingredients-list");

        new Sortable(container, {
          handle: ".drag-handle", // מאפשר לגרור רק דרך כפתור ההמבורגר
          animation: 250, // אנימציה חלקה כמו בגוגל מאפס
          ghostClass: "sortable-ghost",

          // הפעולה החשובה ביותר - מסנכרנת את הסדר החדש חזרה לקוד שלך
          onEnd: function () {
            // 1. שולפים את כל האינפוטים לפי הסדר החדש ב-DOM
            const allInputs = container.querySelectorAll(".ing-input");

            // 2. בונים מחדש את המערך groceryList לפי הסדר החדש
            groceryList = Array.from(allInputs).map((input) => input.value);

            // 3. מעדכנים מחדש את ה-dataset.index של כולם כדי שה-onblur ו-oninput ימשיכו לעבוד נכון
            allInputs.forEach((input, i) => {
              input.dataset.index = i;
              input.placeholder =
                i === 0 ? "הוסף מצרך ראשון" : "הוסף מצרך נוסף";
            });
          },
        });
      }

      function autoResize(el) {
        const scrollY = window.scrollY;
        el.style.height = "auto";
        el.style.height = el.scrollHeight + "px";
        window.scrollTo(0, scrollY);
      }

      document.addEventListener(
        "touchstart",
        function (event) {
          if (event.touches.length > 1) event.preventDefault();
        },
        { passive: false },
      );

      let lastTouchEnd = 0;
      document.addEventListener(
        "touchend",
        function (event) {
          const now = new Date().getTime();
          if (now - lastTouchEnd <= 300) event.preventDefault();
          lastTouchEnd = now;
        },
        false,
      );

      // מניעת לחיצה ימנית על כל התמונות בדף
      document.addEventListener(
        "contextmenu",
        function (e) {
          if (e.target.tagName === "IMG") {
            e.preventDefault();
          }
        },
        false,
      );
    </script>

    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js").catch(function (error) {
          console.log("Service worker registration failed:", error);
        });
      }
    </script>
  </body>
</html>
